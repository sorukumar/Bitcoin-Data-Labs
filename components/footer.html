    <div class="bdl-footer-inner">
        <div class="bdl-footer-copyright">
            <p style="margin: 0;">
                © <span id="footer-year"></span> <a href="https://bitcoindatalabs.org" style="color: var(--primary, #E8916B); text-decoration: none; font-weight: 600;">Bitcoin Data Labs</a>. All rights reserved.
            </p>
        </div>
        <div id="appFooterLinks" class="bdl-footer-links">
            <!-- Populated dynamically by app-components.js -->

            <a href="https://github.com/sorukumar/Bitcoin-Data-Labs" target="_blank" style="color: inherit; text-decoration: none; font-size: 1.2rem; transition: color 0.2s;" onmouseover="this.style.color='var(--primary, #E8916B)'" onmouseout="this.style.color='inherit'"><i class="fab fa-github"></i></a>
